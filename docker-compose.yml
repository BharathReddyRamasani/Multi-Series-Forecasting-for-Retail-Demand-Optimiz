version: "3.8"

services:
  forecast-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demandai-api
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - CORS_ORIGINS=http://localhost:8000,http://localhost:3000,http://127.0.0.1:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ./models:/app/models:ro
      - ./backend/logs:/app/backend/logs
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
